<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>العالم المتوسطي وبناء الحداثة</title><style>body{margin:0;display:grid;place-items:center;min-height:100vh;background:#f6f1e7;color:#172633;font-family:system-ui;text-align:center}i{display:block;width:48px;height:48px;border:5px solid #dfd6c8;border-top-color:#e97818;border-radius:50%;margin:18px auto;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><main><i></i><h1>جارٍ بناء الدرس المرجعي…</h1><p>وثائق الأستاذ • 3 حصص • أنشطة • تقويم • قالب أتمتة</p></main><script src="history-data-1.js"></script><script src="history-data-2.js"></script><script src="history-data-3.js"></script><script src="history-hex-4.js"></script><script>window.__H=(window.__H||'')+(window.__HX||'');</script><script src="history-data-5.js"></script><script src="history-data-6.js"></script><script src="history-data-7.js"></script><script>(async()=>{let h=await new Response(new Blob([Uint8Array.from(atob(window.__H),c=>c.charCodeAt(0))]).stream().pipeThrough(new DecompressionStream('gzip'))).text();const css=`:root{--teal:#167c7a}.master-badge{display:inline-flex;align-items:center;gap:7px;margin:10px 0;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:6px 11px;color:#f6ce7d;font:800 10px Cairo}.master-badge:before{content:'✓';display:grid;place-items:center;width:20px;height:20px;border-radius:50%;background:#e97818;color:#fff}.route-section{background:linear-gradient(180deg,#f7f2e8,#eee2d0)}.route-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.route-card{position:relative;overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:23px;padding:21px;box-shadow:0 16px 40px rgba(40,30,20,.07)}.route-card:before{content:attr(data-session);position:absolute;left:15px;top:5px;font:900 48px Cairo;color:rgba(27,111,159,.08)}.route-card .time{display:inline-flex;backgro يف العالم المتوسطي.</li><li>تمييز المركز والضفتين والامتدادات.</li><li>ترتيب الأحداث بين 1453م و1789م.</li></ul><div class="output"><b>المنتوج:</b> تعريف وخط زمني مصغر.</div></article><article class="route-card" data-session="02"><span class="time">55 دقيقة</span><h3>أفسر التوازن وبناء الحداثة</h3><p>تحليل أدلة القوة المتقابلة وربط الفكر والتقنية والاقتصاد والسياسة.</p><ul><li>فهم التوازن النسبي.</li><li>بناء شبكة مفاهيم الحداثة.</li><li>تصنيف عوامل التحول وربطها.</li></ul><div class="output"><b>المنتوج:</b> خطاطة سببية متعددة العوامل.</div></article><article class="route-card" data-session="03"><span class="time">55 دقيقة</span><h3>أفسر اختلال ميزان القوة</h3><p>مقارنة مرحلتين وتحليل تحول الطرق وإنتاج تركيب وتقويم نهائي.</p><ul><li>تمييز المؤشر عن السبب.</li><li>رفض التفسير بعامل واحد.</li><li>صياغة جواب مدعم بأمثلة.</li></ul><div class="output"><b>المنتوج:</b> فقرة تركيبية وتقويم ذاتي.</div></article></div><div class="route-table"><div class="route-row head"><b>المكون</b><b>الحصة 1</b><b>الحصة 2</b><b>الحصة 3</b></div><div class="route-row"><b>الوثيقة</b><span>خريطة وخط زمني</span><span>إنفوغرافيا الحداثة</span><span>تحول الطرق ومقارنة</span></div><div class="route-row"><b>المهارة</b><span>التوطين والتأطير</span><span>التفسير السببي</span><span>المقارنة والتركيب</span></div><div class="route-row"><b>التقويم</b><span>بطاقة خروج</span><span>تصنيف وربط</span><span>فقرة محكمة</span></div></div></div></section>`;const method=`<section class="section method-lab" id="method-lab" data-track-section><div class="shell"><div class="section-head"><span class="kicker">منهج التفكير التاريخي</span><h2>لا أكتفي بالمعلومة: أتعلم كيف يبني المؤرخ تفسيره</h2><p>مراحل ثابتة تتكرر في كل ورشة وثائق وفي كل درس تاريخ ينتجه القالب.</p></div><div class="thinking-grid"><article class="thinking-card"><b>1</b><h3>أعرّف الوثيقة</h3><p>نوعها وموضوعها ومصدرها وتاريخها وسياقها.</p></article><article class="thinking-card"><b>2</b><h3>ألاحظ وأنتقي</h3><p>أستخرج المعطيات وأميز الاتجاه والتغير والفاعل omation-board"><div class="auto-flow">${items.map((x,i)=>`<div class="auto-step"><b>${i+1}</b><div><strong>${x[0]}</strong><span>${x[1]}</span></div><i>${x[2]}</i></div>`).join('')}</div><aside class="quality-gates"><h3>بوابات تمنع الدرس الهزيل</h3><ul><li>لا درس من دون وثائق أصلية أو مبررة.</li><li>لا نشاط من دون هدف وأثر تعلم وتصحيح.</li><li>لا معلومة زمنية أو مجالية دون تحقق.</li><li>لا صورة مولدة بوصفها وثيقة تاريخية.</li><li>لا نشر قبل اختبار الهاتف والطباعة.</li><li>لا أتمتة تلغي قرار الأستاذ.</li></ul><code>source → lesson.json → validation → template → QA → teacher approval → deploy</code></aside></div></div></section>`;h=h.replace(/<title>[^<]*<\/title>/,'<title>الدرس المرجعي: العالم المتوسطي وبناء الحداثة | ذ. أحمد بوعمود</title>').replace('قالب history-smart-v1 • نسخة 3.0.0','قالب history-master-v4 • نسخة 4.0.0').replace('آخر مراجعة: 2026-07-17 • reviewed','آخر مراجعة: 2026-07-18 • نسخة مرجعية محكمة').replace('</head>',`<style>${css}</style></head>`).replace('<button data-target="diagnostic">تشخيص</button>','<button data-target="diagnostic">تشخيص</button><button data-target="route">خريطة الحصص</button><button data-target="method-lab">منهج المؤرخ</button>').replace('<button data-target="summary">الملخص</button>','<button data-target="archive">أرشيف الأستاذ</button><button data-target="summary">الملخص</button><button data-target="automation" class="teacher-nav">قالب الأتمتة</button>').replace('<div class="hero__actions">','<span class="master-badge">نسخة مرجعية كاملة وليست ملخصًا</span><div class="hero__actions">').replace('</section>\n\n<section class="section diagnostic" id="diagnostic">',`</section>${route}<section class="section diagnostic" id="diagnostic">`).replace('<section class="section teacher-only teacher-section" id="teacher">',`${method}<section class="section teacher-only teacher-section" id="teacher">`).replace('<section class="section alt summary" id="summary">',`${archive}<section class="section alt summary" id="summary">`).replace('<section class="section sources" id="sources">',`${automation}<section class="section sources" id="sources">`);h=h.replace('</body>',`<script>(()=>{const g=document.querySelector('[data-archive-grid]');if(!g)return;const n=['خريطة العالم المتوسطي','الإطار الزمني','مفهوم الحداثة','اختلال التوازن'],d=['وثيقة توطين أصلية','شريحة لبناء التسلسل','وثيقة مفهومية أصلية','وثيقة تفسيرية أصلية'],seen=new Set();[...document.querySelectorAll('.document-media img')].forEach((im,i)=>{if(seen.has(im.src)||seen.size>=4)return;seen.add(im.src);g.insertAdjacentHTML('beforeend','<article class="archive-card"><img src="'+im.src+'" alt="'+n[i]+'"><div><h3>'+n[i]+'</h3><p>'+d[i]+'</p></div></article>')})})();<\/script></body>`);document.open();document.write(h);document.close()})().catch(e=>document.body.innerHTML='<main><h1>تعذر فتح الدرس</h1><p>حدّث متصفح Chrome ثم أعد المحاولة.</p></main>')</script></body></html>
