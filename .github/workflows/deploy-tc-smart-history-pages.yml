name: Deploy Smart History Platform to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'tc-smart-history/**'
      - '.github/workflows/deploy-tc-smart-history-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: tc-smart-history

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
